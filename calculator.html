<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Υπολογιστής Τιμών | Βιοκαρπέτ Candia Αιγίου</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-400: #a3a3a3;
            --gray-600: #525252;
            --green: #22c55e;
            --gold: #c9a96e;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: url('https://images.pexels.com/photos/20871195/pexels-photo-20871195/free-photo-of-interior-design-of-bedroom.png?auto=compress&cs=tinysrgb&w=1920') center/cover no-repeat fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 100%;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 0;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--black) 0%, var(--gold) 50%, var(--black) 100%);
            z-index: 10;
        }

        .card-content {
            padding: 28px 24px 24px;
            position: relative;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--black);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            color: var(--gray-400);
            letter-spacing: 1px;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .field input {
            width: 100%;
            font-family: inherit;
            font-size: 20px;
            font-weight: 600;
            color: var(--black);
            background: var(--gray-100);
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            padding: 12px 40px 12px 14px;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .field input:focus {
            border-color: var(--gold);
            background: var(--white);
        }

        .input-suffix {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-400);
            pointer-events: none;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
            margin: 20px 0;
            opacity: 0.5;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-radius: 12px;
            background: var(--gray-100);
        }

        .result-box.final {
            background: var(--black);
        }

        .result-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-box.final .result-label {
            color: rgba(255,255,255,0.6);
        }

        .result-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--black);
        }

        .result-box.final .result-value {
            color: var(--gold);
            font-size: 24px;
        }

        @media (min-width: 481px) {
            .card {
                border-radius: 24px;
            }
            .card-content {
                padding: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-content">
                <a href="index.html" class="back-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    Πίσω
                </a>

                <div class="header">
                    <h1>Υπολογιστής Τιμών</h1>
                    <p>ΧΟΝΔΡΙΚΗ &rarr; ΛΙΑΝΙΚΗ ΜΕ ΕΚΠΤΩΣΗ</p>
                </div>

                <div class="field">
                    <label for="wholesale">Τιμή Χονδρικής (&euro;)</label>
                    <div class="input-wrap">
                        <input type="number" id="wholesale" inputmode="decimal" step="0.01" min="0" placeholder="0.00">
                        <span class="input-suffix">&euro;</span>
                    </div>
                </div>

                <div class="field">
                    <label for="vat">Φ.Π.Α.</label>
                    <div class="input-wrap">
                        <input type="number" id="vat" inputmode="decimal" step="0.01" min="0" value="24">
                        <span class="input-suffix">%</span>
                    </div>
                </div>

                <div class="field">
                    <label for="discount">Έκπτωση σε Πελάτη</label>
                    <div class="input-wrap">
                        <input type="number" id="discount" inputmode="decimal" step="0.01" min="0" max="100" placeholder="0">
                        <span class="input-suffix">%</span>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="results">
                    <div class="result-box">
                        <span class="result-label">Αρχική Τιμή</span>
                        <span class="result-value" id="initialPrice">0.00 &euro;</span>
                    </div>
                    <div class="result-box final">
                        <span class="result-label">Τελική Τιμή</span>
                        <span class="result-value" id="finalPrice">0.00 &euro;</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const wholesaleEl = document.getElementById('wholesale');
        const vatEl = document.getElementById('vat');
        const discountEl = document.getElementById('discount');
        const initialPriceEl = document.getElementById('initialPrice');
        const finalPriceEl = document.getElementById('finalPrice');

        function formatEuro(value) {
            return value.toLocaleString('el-GR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
        }

        function calculate() {
            const wholesale = parseFloat(wholesaleEl.value) || 0;
            const vat = parseFloat(vatEl.value) || 0;
            const discount = parseFloat(discountEl.value) || 0;

            const initialPrice = wholesale * 2 * (1 + vat / 100);
            const finalPrice = initialPrice * (1 - discount / 100);

            initialPriceEl.textContent = formatEuro(initialPrice);
            finalPriceEl.textContent = formatEuro(finalPrice);
        }

        [wholesaleEl, vatEl, discountEl].forEach(el => {
            el.addEventListener('input', calculate);
        });

        calculate();
    </script>
</body>
</html>
